name: HR Digest — Model AG

on:
  schedule:
    # Täglich 05:00 UTC = 07:00 MESZ (Sommer) / 06:00 MEZ (Winter)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      format:
        description: 'Ausgabeformat'
        type: choice
        default: 'both'
        options:
          - both          # Kurzdigest + Vollreport (Default, wie Montags-Lauf)
          - digest        # Nur Format A — Kurzdigest
          - full-report   # Nur Format B — Vollständiger HR Intelligence Report
          - check-feeds   # Nur Feed-Gesundheitscheck (kein HTML, kein Commit)

permissions:
  contents: write

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get date
        id: date
        run: echo "date=$(date +%d.%m.%Y)" >> "$GITHUB_OUTPUT"

      - name: Generate HR Digest
        run: |
          # Logo (MODEL_Logo*.jpg/png im Repo-Root) wird vom Script
          # automatisch erkannt und als Base64 eingebettet.
          # Zeitplan-Läufe (leerer Input) erzeugen beide Formate.
          case "${{ github.event.inputs.format }}" in
            digest)      python hr_digest.py ;;
            full-report) python hr_digest.py --full ;;
            check-feeds) python hr_digest.py --check-feeds ;;
            *)           python hr_digest.py && python hr_digest.py --full ;;
          esac

      - name: Convert to PDF
        run: |
          # PDF für Business-Nutzer: klickbar und direkt lesbar,
          # Branding bleibt 1:1 erhalten (Chrome ist auf dem Runner vorinstalliert).
          # Das HTML dient nur als Zwischenschritt und wird nicht abgelegt.
          for f in *.html; do
            [ -e "$f" ] || continue
            google-chrome --headless --disable-gpu --no-sandbox --no-pdf-header-footer \
              --print-to-pdf="${f%.html}.pdf" "file://$PWD/$f"
          done
          rm -f *.html

      - name: Move output
        run: mkdir -p output && mv *.pdf output/ 2>/dev/null || true

      - name: Commit and push
        run: |
          git config user.name "HR News Bot"
          git config user.email "bot@noreply.github.com"
          git add output/
          if git diff --staged --quiet; then
            echo "Keine neuen Digest-Dateien — nichts zu committen"
          else
            git commit -m "HR Digest $(date +%Y-%m-%d)"
            git pull --rebase origin "${{ github.ref_name }}"
            git push
          fi

      - name: Upload PDFs as artifact
        if: github.event.inputs.format != 'check-feeds'
        uses: actions/upload-artifact@v4
        with:
          name: hr-digest-${{ steps.date.outputs.date }}
          path: output/*.pdf
          retention-days: 90
